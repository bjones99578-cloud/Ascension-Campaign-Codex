    <line x1="171.0" y1="59.0" x2="177.9" y2="55.0" />
    <line x1="179.2" y1="78.8" x2="186.9" y2="76.7" />
    <line x1="182.0" y1="100.0" x2="190.0" y2="100.0" />
    <line x1="179.2" y1="121.2" x2="186.9" y2="123.3" />
    <line x1="171.0" y1="141.0" x2="177.9" y2="145.0" />
    <line x1="158.0" y1="158.0" x2="163.6" y2="163.6" />
    <line x1="141.0" y1="171.0" x2="145.0" y2="177.9" />
    <line x1="121.2" y1="179.2" x2="123.3" y2="186.9" />
    <line x1="100.0" y1="182.0" x2="100.0" y2="190.0" />
    <line x1="78.8" y1="179.2" x2="76.7" y2="186.9" />
    <line x1="59.0" y1="171.0" x2="55.0" y2="177.9" />
    <line x1="42.0" y1="158.0" x2="36.4" y2="163.6" />
    <line x1="29.0" y1="141.0" x2="22.1" y2="145.0" />
